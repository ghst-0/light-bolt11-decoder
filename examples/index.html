<!doctype html>
<html lang="en">
  <head>
    <title>bolt11 demo</title>
    <script type="module">
      import { start } from './example.build.js'

      window.onload = start
    </script>
    <meta charset="utf-8" />
    <style>
      #textInput {
        margin: 18px;
        width: 90%;
        height: 80px;
      }

      #decoded {
        white-space: pre-wrap;
        text-wrap-mode: wrap;
        white-space-collapse: preserve;
        word-wrap: break-word;
        overflow-wrap: break-word;
        word-break: break-all;
      }

      #info {
        margin: 8px;
        padding: 8px;
        color: white;
      }
    </style>
  </head>
  <body>
    <label for="textInput"></label>
    <textarea id="textInput"></textarea><br />
    <span id="decoded"></span>
    <div id="info"></div>
  </body>
</html>
